# Quick way to run the scanner anywhere with Docker (incl. as a reference for the
# NixOS oci-container — see SETUP-NIXOS.md). Exposure (Cloudflare Tunnel /
# Tailscale Funnel) is handled outside this file.
services:
  awp-scanner:
    build: .
    image: awp-scanner:latest
    restart: unless-stopped
    environment:
      # Shared secret; MUST match the Worker's SCAN_TOKEN (wrangler secret put).
      - SCAN_TOKEN=${SCAN_TOKEN:?set SCAN_TOKEN}
      # Optional override; defaults to the deployed Worker's /ws/scanner.
      - WORKER_WS_URL=${WORKER_WS_URL:-wss://awp-api.kihwouih.workers.dev/ws/scanner}
      - PORT=8080
    ports:
      # The scanner dials OUT to the Worker — no inbound is required for it to
      # work. 8080 is only the local /healthz (curl on the host for ops checks).
      - "8080:8080"
    # Chromium needs a bit of shared memory; bump it to avoid crashes.
    shm_size: "1gb"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
